    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="SkyRa Energy: solar panels, home batteries and inverters, supplied and installed for homes and businesses across Australia." />

    <!-- Social sharing (Open Graph / Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SkyRa Energy" />
    <meta property="og:title" content="SkyRa Energy | Solar Panels & Home Batteries" />
    <meta property="og:description" content="Solar panels, home batteries and inverters, supplied and installed for homes and businesses across Australia." />
    <meta property="og:url" content="https://skyraenergy.com.au/" />
    <meta property="og:image" content="https://skyraenergy.com.au/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkyRa Energy | Solar Panels & Home Batteries" />
    <meta name="twitter:description" content="Solar panels, home batteries and inverters, supplied and installed for homes and businesses across Australia." />
    <meta name="twitter:image" content="https://skyraenergy.com.au/og-image.jpg" />
    <link rel="canonical" href="https://skyraenergy.com.au/" />

    <!-- Organization schema, present before JS runs. The app injects
         page-specific schema (services, FAQs) at runtime. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SkyRa Energy",
        "url": "https://skyraenergy.com.au",
        "logo": "https://skyraenergy.com.au/images/skyra-logo.webp",
        "image": "https://skyraenergy.com.au/og-image.jpg",
        "description": "Solar panels, home batteries and inverters, designed, supplied and installed as one system for homes and businesses across Australia.",
        "taxID": "48 667 329 044",
        "identifier": { "@type": "PropertyValue", "propertyID": "ABN", "value": "48 667 329 044" },
        "areaServed": { "@type": "Country", "name": "Australia" },
        "knowsAbout": [
          "Solar panel installation",
          "Home battery storage",
          "Hybrid solar inverters",
          "Commercial solar systems",
          "Australian solar and battery rebates"
        ]
      }
    </script>

    <!-- Manrope variable font, self-hosted (declared in src/index.css) -->
    <link rel="preload" href="/fonts/manrope-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Preload hero LCP image (responsive - matches the <img srcset>) -->
    <link
      rel="preload"
      as="image"
      href="/images/photos/hero-install-1280.webp"
      imagesrcset="/images/photos/hero-install-768.webp 768w, /images/photos/hero-install-1280.webp 1280w, /images/photos/hero-install-1920.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
  </head>
